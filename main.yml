---
# ansible-playbook -i inventory k8.yml -e "cp_dns_name=cp.example.com" -e "he_net_password=your_he_password"  -e "ext_domain=your.domain.com"

# =================================================================
# PART 1: COMMON TASKS (EXECUTED ON ALL K8S NODES)
# =================================================================
- name: K8S Cluster Setup
  hosts: k8s_cluster
  become: true

  roles:
    - role: k8s_prerequisites
      tags: k8s-prerequisites

# =================================================================
# PART 2: CLUSTER INITIALIZATION (EXECUTED ONLY ON 1ST CP)
# =================================================================
- name: K8S Control Plane Setup
  hosts: control_plane[0]
  become: true

  roles:
    - role: k8s_control
      tags: k8s-control

# =================================================================
# PART 2.1: ALL CONTROL PLANE JOIN
# =================================================================
- name: Get join command from control plane 0
  hosts: control_plane[0]
  tags: k8s-control
  run_once: true
  become: true
  tasks:
    - name: Generate join command
      ansible.builtin.shell: |
        hash=$(kubeadm init phase upload-certs --upload-certs | grep -v upload)
        kubeadm token create --print-join-command --certificate-key $hash
      register: cp_join_command
      when: groups['control_plane'] | length > 1

- name: Join control plane pool
  hosts: control_plane[1:]
  tags: [k8s-control]
  become: true
  gather_facts: false
  tasks:
    - name: Run join command
      ansible.builtin.shell: "{{ hostvars[groups['control_plane'][0]]['cp_join_command']['stdout'] }}"
      when: groups['control_plane'] | length > 1
      args:
        creates: /etc/kubernetes/kubelet.conf

# =================================================================
# PART 3: WORKER NODE JOIN (EXECUTED ONLY ON WORKERS)
# =================================================================
- name: K8S Workers Setup
  hosts: workers
  become: true
  gather_facts: false

  roles:
    - role: k8s_workers
      tags: k8s-workers

# =================================================================
# PART 4: FINAL NODE RESTART (EXECUTED ON ALL NODES)
# =================================================================
- name: All Nodes Final Reboot
  hosts: k8s_cluster
  tags: k8s-control,k8s-workers
  become: true
  gather_facts: false

  tasks:
    - name: Restart All Nodes to apply all changes
      ansible.builtin.reboot:

# =================================================================
# PART 5: Keycloak Deployment (EXECUTED ONLY ON CP)
# =================================================================
- name: Install Basic Apps (KeyCloak, Vault)
  hosts: control_plane[0]
  become: true
  gather_facts: false

  roles:
    - role: k8s_apps
      tags: k8s-apps
