---
# =================================================================
# PART 1: COMMON TASKS (EXECUTED ON ALL K8S NODES)
# =================================================================
- name: Nginx and Certbot setup
  hosts: control_plane
  become: true
  gather_facts: false
  roles:
    - role: k8s_nginx
      target_services: "{{ nginx_services | selectattr('type', 'equalto', 'all') | list }}"
