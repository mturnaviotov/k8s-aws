---
- name: Deploy Vault
  block:
    - name: Create random Vault password
      ansible.builtin.set_fact:
        vault_password: "{{ lookup('password', '/dev/null length=12 chars=ascii_letters,digits') }}"

    - name: Vault get repo and values
      ansible.builtin.shell: |
        helm repo add hashicorp https://helm.releases.hashicorp.com
        helm repo update
        curl https://raw.githubusercontent.com/hashicorp/vault-helm/refs/heads/main/values.yaml > /home/ubuntu/vault.yaml

    - name: Vault patch PVC claim size
      ansible.builtin.replace:
        path: /home/ubuntu/vault.yaml
        regexp: "10Gi"
        replace: "128Mi"

    - name: Vault patch dev mode
      ansible.builtin.replace:
        path: /home/ubuntu/vault.yaml
        regexp: '^\s+dev:\n\s+enabled: false'
        replace: "  dev:\n    enabled: true"

    - name: Vault patch root password
      ansible.builtin.replace:
        path: /home/ubuntu/vault.yaml
        regexp: 'devRootToken: "root"'
        replace: 'devRootToken: "{{ vault_password }}"'

    - name: Install Vault to cluster
      ansible.builtin.shell: |
        kubectl create ns vault
        helm -n vault install vault hashicorp/vault -f /home/ubuntu/vault.yaml
        rm -f /home/ubuntu/vault.yaml

    - name: Save Vault password to file
      delegate_to: localhost
      become: false
      ansible.builtin.lineinfile:
        path: password_vault.txt
        create: yes
        line: "{{ vault_password }}"

  notify:
    - Restart systemd-resolved
