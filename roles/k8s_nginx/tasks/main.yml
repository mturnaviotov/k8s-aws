- name: Install Nginx
  block:
    - name: Nginx vHosts for basic services
      ansible.builtin.template:
        src: nginx.tpl
        dest: /etc/nginx/sites-enabled/{{ item.service_name }}.conf
        owner: root
        group: root
        mode: "0644"
      loop: "{{ target_services }}"
      notify: Restart Nginx

    - name: Flush handlers
      ansible.builtin.meta: flush_handlers

    - name: Create SSL certificates with Certbot for Nginx
      ansible.builtin.shell: |
        certbot --nginx -n --agree-tos --email admin@{{ ext_domain }} -d {{ item.service_name }}.{{ ext_domain }} --redirect
      loop: "{{ target_services }}"
      args:
        creates: "/etc/letsencrypt/live/{{ item.service_name }}.{{ ext_domain }}/fullchain.pem"
      notify: Restart Nginx
